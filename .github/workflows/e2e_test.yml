name: E2E Test

on:
  pull_request_target:
    branches:
      - 5.x
      - e2e-5x-test-ci-branch
    paths-ignore:
      - "**.md"
  push:
    branches:
      - 5.x
      - e2e-5x-test-ci-branch
    paths-ignore:
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # EXPERIMENT: Single job like JBang workflow to eliminate image save/restore
  # Removed 'needs: build' - this job now does both build and test
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17"]
        runtime: ["springboot"]  # Only test springboot for now
        browser: ["firefox"]
    env:
      REPORT_DIR: results-${{matrix.runtime}}-${{matrix.java}}-${{matrix.browser}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request_target'
        with:
          ref: "refs/pull/${{ github.event.number }}/merge"
      - name: Checkout code
        uses: actions/checkout@v6
        if: github.event_name == 'push'
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.java }}
          cache: "" # Disabled to prevent stale target/ directory caching
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Build (JBang-style two-phase)
        run: |
          # Phase 1: Build entire project to ensure all modules are fresh
          mvn --batch-mode --no-transfer-progress install -DskipTests
          # Phase 2: Build Docker images (artifacts are now fresh in .m2)
          mvn --batch-mode --no-transfer-progress install -DskipTests \
            -Pe2e -Pdocker-testsuite -Ptests-docker -Dhawtio-container \
            -pl :hawtio-test-suite,:hawtio-tests-${{matrix.runtime}}
      - name: Verify test-suite has JFR module (after build)
        run: |
          echo "=== Checking for --add-modules flag ==="
          docker run --rm hawtio-test-suite:${{ matrix.java }} cat /workspace/tests/hawtio-test-suite/src/main/java/io/hawt/tests/features/setup/deployment/DockerDeployment.java | grep "add-modules" || echo "WARNING: --add-modules flag not found in DockerDeployment.java"
          echo "=== Checking for JFR_DEPLOY_VER_1 marker ==="
          docker run --rm hawtio-test-suite:${{ matrix.java }} cat /workspace/tests/hawtio-test-suite/src/main/java/io/hawt/tests/features/setup/deployment/DockerDeployment.java | grep "JFR_DEPLOY_VER_1" || echo "WARNING: JFR_DEPLOY_VER_1 marker not found in DockerDeployment.java"
      - name: ${{ matrix.runtime }} E2E test (Java ${{ matrix.java }})
        id: test
        run: |
          runtime=${{matrix.runtime}}
          extra_args=''
          if [[ $runtime =~ "-keycloak" ]]; then
            runtime=${runtime%-keycloak}
            extra_args='-Dio.hawt.test.use.keycloak=true'
          fi
          docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $PWD/$REPORT_DIR:/workspace/tests/hawtio-test-suite/target \
          -v $PWD/$REPORT_DIR/build:/workspace/tests/hawtio-test-suite/build/ \
          --shm-size="2g" \
            hawtio-test-suite:${{ matrix.java }} -Pe2e-${runtime} -Dselenide.browser=${{ matrix.browser }} \
            -Dio.hawt.test.docker.image=hawtio-${runtime}-app:${{ matrix.java }} $extra_args
      - name: Archive test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "test-results-${{ matrix.runtime }}-java-${{ matrix.java }}-${{ matrix.browser }}"
          path: |
            ${{ env.REPORT_DIR }}/build/reports/tests/*.png
            ${{ env.REPORT_DIR }}/*.log
            ${{ env.REPORT_DIR }}/cucumber-reports/*

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request_target'
        with:
          ref: "refs/pull/${{ github.event.number }}/merge"
      - name: Checkout code
        uses: actions/checkout@v6
        if: github.event_name == 'push'
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.java }}
          cache: "" # Disabled to prevent stale target/ directory caching
      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3.6.0
      - name: Verify workspace source before build
        run: |
          echo "=== Checking source file in workspace BEFORE Docker build ==="
          cat tests/hawtio-test-suite/src/main/java/io/hawt/tests/features/setup/deployment/DockerDeployment.java | grep "JFR_DEPLOY_VER_1" && echo "✓ WORKSPACE: Fresh source confirmed" || echo "✗ WORKSPACE: STALE SOURCE"
      - name: Build (two-phase like JBang)
        run: |
          # Phase 1: Build entire project to ensure all modules are fresh
          mvn --batch-mode --no-transfer-progress clean install -DskipTests
          # Phase 2: Build Docker images (artifacts are now fresh in .m2)
          mvn --batch-mode --no-transfer-progress install -DskipTests \
            -Pe2e -Pdocker-testsuite -Ptests-docker -Dhawtio-container \
            -Ddocker.buildArg.CACHE_BUST=${{ github.run_id }} \
            -pl :hawtio-test-suite,:hawtio-tests-quarkus,:hawtio-tests-springboot
      - name: Inspect docker-build.tar contents
        run: |
          echo "=== Checking what maven-docker-plugin put in docker-build.tar ==="
          tar -xOf tests/hawtio-test-suite/target/docker/hawtio-test-suite/17/tmp/docker-build.tar tests/hawtio-test-suite/src/main/java/io/hawt/tests/features/setup/deployment/DockerDeployment.java | grep "JFR_DEPLOY_VER_1" && echo "✓ TAR: Fresh source" || echo "✗ TAR: STALE SOURCE"
      - name: Verify BUILT image has fresh source
        run: |
          echo "=== BUILD JOB: Checking image built in this job ==="
          docker run --rm hawtio-test-suite:${{ matrix.java }} cat /workspace/tests/hawtio-test-suite/src/main/java/io/hawt/tests/features/setup/deployment/DockerDeployment.java | grep "JFR_DEPLOY_VER_1" && echo "✓ BUILD: Fresh source confirmed" || echo "✗ BUILD: STALE SOURCE IN BUILT IMAGE"
      - name: Export docker images
        run: |
          mkdir -p /tmp/images/
          docker save hawtio-test-suite:${{ matrix.java }} > /tmp/images/hawtio-test-suite-${{ matrix.java }}.tar
          docker save hawtio-quarkus-app:${{ matrix.java }} > /tmp/images/hawtio-quarkus-app-${{ matrix.java }}.tar
          docker save hawtio-springboot-app:${{ matrix.java }} > /tmp/images/hawtio-springboot-app-${{ matrix.java }}.tar
      - name: Cache images
        uses: actions/cache/save@v4
        with:
          path: /tmp/images
          key: e2e-docker-images-${{ matrix.java }}-${{ github.run_id }}-${{ github.run_attempt }}

  publish-results:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      checks: write
      actions: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Archive failed test reports
        uses: actions/upload-artifact/merge@v4
        if: always()
        with:
          name: "test-results"
          pattern: test-results-*
          separate-directories: true
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: "test-results"
          path: "test-results"
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/Cucumber.xml
          json_file: results.json
      - name: Install xmllint
        run: sudo apt-get install -y xmlstarlet jq
      - name: Generate summary
        run: |
          export CHECK_URL=$(jq -r .check_url results.json)
          bash tests/hawtio-test-suite/process_test_results.sh test-results > summary.md
      - name: Update summary
        run: |
          cat summary.md >> $GITHUB_STEP_SUMMARY
      - uses: tibdex/github-app-token@v2
        if: github.event_name == 'pull_request_target'
        id: generate-token
        with:
          app_id: ${{ secrets.HAWTIO_CI_APP_ID }}
          private_key: ${{ secrets.HAWTIO_CI_PRIVATE_KEY }}
      - name: Comment PR with summary
        if: github.event_name == 'pull_request_target'
        uses: thollander/actions-comment-pull-request@v2
        with:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          filePath: summary.md
          comment_tag: execution
